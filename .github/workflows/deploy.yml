name: Deploy TradeIndia
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Fetch latest index.html from Gist
        run: |
          curl -L "https://gist.githubusercontent.com/Dikshant-008/c1dba97563f61c14c7ed95d9e2e154e2/raw/index.html" -o index.html
          echo "Downloaded $(wc -c < index.html) bytes"

      - name: Write _headers file for CSP
        run: |
          printf '/*\n  Content-Security-Policy: default-src '"'"'self'"'"' '"'"'unsafe-inline'"'"' '"'"'unsafe-eval'"'"' https: data: blob:; frame-src https://www.tradingview.com https://s.tradingview.com https://in.tradingview.com; connect-src *; img-src * data: blob:;\n' > _headers

      - name: Commit and push
        run: |
          git config user.email "deploy@tradeindia.com"
          git config user.name "TradeIndia Deploy Bot"
          git add index.html _headers
          git diff --staged --quiet && echo "No changes to deploy" || (git commit -m "Auto-deploy: update index.html + CSP headers" && git push)
