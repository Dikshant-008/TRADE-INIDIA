name: Deploy TradeIndia
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
      - name: Download latest index.html
        run: |
          curl -o index.html "${{ github.event.inputs.url }}"
      - name: Commit and push
        run: |
          git config user.email "deploy@tradeindia.com"
          git config user.name "TradeIndia Deploy"
          git add index.html
          git commit -m "Auto-deploy update" || echo "No changes"
          git push
